<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="main-container">
        <a href="https://www.tiktok.com/@yawto_" class="brand-logo" target="_blank">
            <i class="fa-solid fa-keyboard"></i>
            <div class="brand-name">
                <span class="yaw">Yaw</span>
                <span class="type">Type</span>
            </div>
        </a>


        <div class="controller-container">
            <div class="controller-one">
                <button class="controller-icon">@ Punctuation</button>
                <button class="controller-icon"># Numbers</button>

            </div>
            <div class="controller-two">
                <button class="controller-icon-active"><i class="fa-regular fa-clock"></i> Time</button>
                <button class="controller-icon"><i class="fa-solid fa-a"></i> Words</button>
                <button class="controller-icon"><i class="fa-solid fa-quote-right"></i> Quotes</button>
                <button class="controller-icon"><i class="fa-solid fa-bolt"></i> Zen</button>
                <button class="controller-icon"><i class="fa-solid fa-wrench"></i> Custom</button>
            </div>
            <div class="controller-three">
                <button class="controller-icon-active">15</button>
                <button class="controller-icon">30</button>
                <button class="controller-icon">45</button>
                <button class="controller-icon">60</button>
                <button class="controller-icon"><i class="fa-solid fa-screwdriver-wrench"></i></button>
            </div>

        </div>
        <div class="stats-container">
            <div class="timer-countdown">
                0
            </div>

            <div class="wpm">
                <button class="language">
                    <i class="fa-solid fa-earth-asia"></i>
                    <span>English</span>
                </button>
                <button class="wpm-value">
                    <i class="fa-solid fa-chart-column"></i>
                    <span class="avg-wpm">avg: 140 wpm</span>
                </button>
            </div>

            <div class=""></div>
        </div>
        <div class="container">

        </div>
        <div class="live-wpm-count">
            0
        </div>
        <div class="result-container">
            <div class="wpm-result">
                <span class="tag">WPM</span>
                <span class="value wpm-value-result">2</span>
            </div>
            <div class="accuaracy-result">
                <span class="tag">ACC</span>
                <span class="value acc-value"></span>
            </div>
            <div class="button-container">
                <button class="next fs-2" onclick="nextTest()"><i class="fa-solid fa-angles-right"></i></button>
                <button class="restart fs-2" onclick=""><i class="fa-solid fa-arrows-rotate"></i></button>


            </div>
        </div>
    </div>
</body>
<script src="index.js"></script>

</html>
