<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="main-container">
        <div class="">
            YawType
        </div>

        <div class="controller-container">
            <div class="controller-one">
                <label class="controller-icon" for="">@ Punctuation</label>
                <label class="controller-icon" for=""># Numbers</label>
            </div>
            <div class="controller-two">
                <label class="controller-icon-active" for="">@ Time</label>
                <label class="controller-icon" for="">@ Words</label>
                <label class="controller-icon" for="">@ Quotes</label>
                <label class="controller-icon" for="">@ Zen</label>
                <label class="controller-icon" for="">@ Custom</label>
            </div>
            <div class="controller-three">
                <label class="controller-icon-active" for="">15</label>
                <label class="controller-icon" for="">30</label>
                <label class="controller-icon" for="">45</label>
                <label class="controller-icon" for="">60</label>
                <label class="controller-icon" for="">$</label>
            </div>

        </div>
        <div class="stats-container">
            <div class="timer-countdown">
                0
            </div>

            <div class="wpm">
                <div class="language">
                    English
                </div>
                <div class="wpm-value">
                    avg: 140 wpm
                </div>
            </div>

            <div class=""></div>
        </div>
        <div class="container">

        </div>
        <div class="result-container">
            <div class="wpm-result">
                <span class="tag">WPM</span>
                <span class="value">100</span>
            </div>
            <div class="accuaracy-result">
                <span class="tag">ACC</span>
                <span class="value">90%</span>
            </div>
            <div class="button-container">
                <label for="" class="next"><i class="fa-solid fa-angles-right"></i></label>
                <label for="" class="restart"><i class="fa-solid fa-arrows-rotate"></i></label>
            </div>
        </div>
    </div>
</body>
<script src="index.js"></script>

</html>
