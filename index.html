<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="main-container">
        <div class="">
            YawType
        </div>

        <div class="controller-container">
            <div class="controller-one">
                <label class="controller-icon" for="">@ Punctuation</label>
                <label class="controller-icon" for=""># Numbers</label>
            </div>
            <div class="controller-two">
                <label class="controller-icon-active" for=""><i class="fa-regular fa-clock"></i> Time</label>
                <label class="controller-icon" for=""><i class="fa-solid fa-a"></i> Words</label>
                <label class="controller-icon" for=""><i class="fa-solid fa-quote-right"></i> Quotes</label>
                <label class="controller-icon" for=""><i class="fa-solid fa-bolt"></i> Zen</label>
                <label class="controller-icon" for=""><i class="fa-solid fa-wrench"></i> Custom</label>
            </div>
            <div class="controller-three">
                <label class="controller-icon-active" for="">15</label>
                <label class="controller-icon" for="">30</label>
                <label class="controller-icon" for="">45</label>
                <label class="controller-icon" for="">60</label>
                <label class="controller-icon" for=""><i class="fa-solid fa-screwdriver-wrench"></i></label>
            </div>

        </div>
        <div class="stats-container">
            <div class="timer-countdown">
                0
            </div>

            <div class="wpm">
                <div class="language">
                    <i class="fa-solid fa-earth-asia"></i>
                    <span>English</span>
                </div>
                <div class="wpm-value">
                    <i class="fa-solid fa-chart-column"></i>
                    <span class="avg-wpm">avg: 140 wpm</span>
                </div>
            </div>

            <div class=""></div>
        </div>
        <div class="container">

        </div>
        <div class="live-wpm-count">
            0
        </div>
        <div class="result-container">
            <div class="wpm-result">
                <span class="tag">WPM</span>
                <span class="value wpm-value-result">2</span>
            </div>
            <div class="accuaracy-result">
                <span class="tag">ACC</span>
                <span class="value acc-value"></span>
            </div>
            <div class="button-container">
                <label for="" class="next" onclick="nextTest()"><i class="fa-solid fa-angles-right"></i></label>
                <label for="" class="restart"><i class="fa-solid fa-arrows-rotate"></i></label>
            </div>
        </div>
    </div>
</body>
<script src="index.js"></script>

</html>
